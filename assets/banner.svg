<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#111A33"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6EE7F9"/>
      <stop offset="0.5" stop-color="#7C9CFF"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7C9CFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7C9CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>
  <ellipse cx="980" cy="120" rx="420" ry="280" fill="url(#glow)"/>
  <ellipse cx="240" cy="360" rx="360" ry="240" fill="url(#glow)" opacity="0.6"/>

  <!-- grid texture -->
  <g stroke="#1E2A4A" stroke-width="1" opacity="0.5">
    <path d="M0 80 H1280 M0 160 H1280 M0 240 H1280 M0 320 H1280"/>
    <path d="M160 0 V400 M320 0 V400 M480 0 V400 M640 0 V400 M800 0 V400 M960 0 V400 M1120 0 V400"/>
  </g>

  <!-- terminal prompt chip -->
  <g transform="translate(96,150)">
    <rect x="0" y="0" width="540" height="56" rx="12" fill="#0E1730" stroke="#27345C"/>
    <circle cx="26" cy="28" r="6" fill="#FF5F57"/>
    <circle cx="48" cy="28" r="6" fill="#FEBC2E"/>
    <circle cx="70" cy="28" r="6" fill="#28C840"/>
    <text x="100" y="35" font-size="22" fill="#9FB4E6" font-family="'SF Mono','JetBrains Mono',monospace">npx skills add ai-skills-zh</text>
  </g>

  <!-- title -->
  <text x="96" y="116" font-size="68" font-weight="800" fill="#FFFFFF" letter-spacing="-1">AI Skills 中文包</text>
  <text x="100" y="262" font-size="26" fill="#C7D2FE" font-weight="500">让 Claude Code · Codex · Cursor 真正懂中国开发场景</text>
  <rect x="96" y="284" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- skill tags -->
  <g font-size="17" font-weight="600">
    <g transform="translate(96,318)">
      <rect width="150" height="40" rx="20" fill="#152043" stroke="#2D3C68"/>
      <text x="75" y="26" text-anchor="middle" fill="#9FB4E6">微信小程序</text>
    </g>
    <g transform="translate(262,318)">
      <rect width="130" height="40" rx="20" fill="#152043" stroke="#2D3C68"/>
      <text x="65" y="26" text-anchor="middle" fill="#9FB4E6">中国支付</text>
    </g>
    <g transform="translate(408,318)">
      <rect width="130" height="40" rx="20" fill="#152043" stroke="#2D3C68"/>
      <text x="65" y="26" text-anchor="middle" fill="#9FB4E6">B站内容</text>
    </g>
    <g transform="translate(554,318)">
      <rect width="160" height="40" rx="20" fill="#152043" stroke="#2D3C68"/>
      <text x="80" y="26" text-anchor="middle" fill="#9FB4E6">Next.js 中国部署</text>
    </g>
    <g transform="translate(730,318)">
      <rect width="130" height="40" rx="20" fill="#152043" stroke="#2D3C68"/>
      <text x="65" y="26" text-anchor="middle" fill="#9FB4E6">反 AI 腔</text>
    </g>
  </g>

  <!-- logo mark -->
  <g transform="translate(1060,150)">
    <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#accent)" opacity="0.15"/>
    <text x="60" y="82" text-anchor="middle" font-size="64" font-weight="800" fill="url(#accent)">智</text>
  </g>
</svg>
